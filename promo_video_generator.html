<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeneX-AI: Multi-Agent Federation Debate</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --physicist: #58a6ff;
            --biologist: #2ea043;
            --reviewer: #bc8cff;
            --error: #f85149;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95vw;
            max-width: 1800px;
            height: 90vh;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        .header {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        /* Chat / Debate Log Area */
        .chat-area {
            flex-grow: 1;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            border-left: 4px solid transparent;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }
        
        .message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .msg-physicist { border-color: var(--physicist); }
        .msg-biologist { border-color: var(--biologist); }
        .msg-reviewer  { border-color: var(--reviewer); }

        .role-badge {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .phys-color { color: var(--physicist); }
        .bio-color { color: var(--biologist); }
        .rev-color { color: var(--reviewer); }

        /* Visualization Area */
        .visualizer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Abstract Node Network representing tumor targeting */
        .network {
            width: 400px;
            height: 400px;
            position: relative;
        }

        .node {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.5s;
        }
        
        /* Specific Nodes */
        .node-egfr { top: 20%; left: 50%; background: var(--physicist); box-shadow: 0 0 20px var(--physicist); }
        .node-tp53 { top: 50%; left: 20%; background: #555; }
        .node-pten { top: 50%; left: 80%; background: #555; }
        .node-tumor { top: 80%; left: 50%; background: var(--error); box-shadow: 0 0 30px var(--error); width: 40px; height: 40px; margin-left:-10px;}

        /* Attack animations */
        .laser {
            position: absolute;
            width: 4px;
            background: var(--biologist);
            box-shadow: 0 0 10px var(--biologist);
            transform-origin: top center;
            opacity: 0;
        }

        @keyframes fire-laser {
            0% { opacity: 1; height: 0; }
            50% { opacity: 1; height: 150px; }
            100% { opacity: 0; height: 150px; }
        }

        /* HUD overlays */
        .hud-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .hud-phys { top: 10%; right: 10%; color: var(--physicist); }
        .hud-bio { bottom: 10%; left: 10%; color: var(--biologist); }
        .hud-rev { bottom: 10%; right: 10%; color: var(--reviewer); }

        .glitch { animation: glitch 0.2s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0); }
            4%, 60% { transform: translate(-2px, 0); }
            62% { transform: translate(0, 0); }
        }

    </style>
</head>
<body>

<div class="container">
    <!-- Left: Federation Debate Log -->
    <div class="panel">
        <div class="header">
            Multi-Agent Federation Debate 
            <span style="float:right; font-size: 0.9rem; color: #8b949e">Target: Glioblastoma</span>
        </div>
        <div class="chat-area" id="chat-box">
            <!-- Messages injected here -->
        </div>
    </div>

    <!-- Right: In-Silico Visualizer -->
    <div class="panel">
        <div class="header">
            In-Silico Target Sandbox
            <span style="float:right; font-size: 0.9rem;">Beat: <span id="beat">0</span></span>
        </div>
        <div class="visualizer" id="vis">
            
            <div class="network">
                <div class="node node-egfr" id="n-egfr"></div>
                <div class="node node-tp53" id="n-tp53"></div>
                <div class="node node-pten" id="n-pten"></div>
                <div class="node node-tumor" id="n-tumor"></div>
                <div class="laser" id="laser" style="top: 25%; left: 50%; transform: rotate(180deg);"></div>
            </div>

            <div class="hud-text hud-phys" id="h-phys">
                ΔG & Thermodynamics<br>CALCULATING...
            </div>
            
            <div class="hud-text hud-bio" id="h-bio">
                Virtual Clinical Trial<br>N = 10,000
            </div>

            <div class="hud-text hud-rev" id="h-rev">
                ECOLOGICAL & TOXICITY<br>VERDICT PENDING
            </div>

        </div>
    </div>
</div>

<script>
    // 1 beat = 500ms
    const script = [
        { t: 1000, role: 'physicist', title: '👨‍🔬 Theoretical Physicist', color: 'phys-color',
          text: 'Initiating first-principles check on Glioblastoma. Calling query_global_bio_gateway(OpenTargets). Identifying EGFRvIII as primary target. Calculating binding free energy (ΔΔG) for conventional inhibitors...',
          action: 'phys-start' },
          
        { t: 3000, role: 'physicist', title: '👨‍🔬 Theoretical Physicist', color: 'phys-color',
          text: 'Objection! Thermodynamics simulation shows high failure rate. Due to the Warburg effect in the tumor microenvironment, local pH drops significantly, protonating the drug and reducing cell membrane permeability by 80%. Conventional docking will fail.' },

        { t: 5500, role: 'biologist', title: '🧬 Synthetic Biologist', color: 'bio-color',
          text: 'Acknowledged. Redesigning molecule structure in Quantum-Bio Sandbox. Adding a fluorinated moiety to lower the pKa, ensuring the drug remains unprotonated in the acidic tumor microenvironment.',
          action: 'bio-attack' },

        { t: 8000, role: 'biologist', title: '🧬 Synthetic Biologist', color: 'bio-color',
          text: 'Running virtual_clinical_trials(drug=Fluoro-EGFR-Inhibitor, pop=10000). Results: Efficacy 85%, Liver Toxicity 5%. Proposing this as the final clinical candidate.' },

        { t: 10500, role: 'reviewer', title: '⚖️ Review Committee', color: 'rev-color',
          text: 'Reviewing clinical and evolutionary risks. Toxicity is acceptable, but you missed tumor evolutionary escape! EGFR inhibition forces the tumor to upregulate PTEN/PI3K pathway. The tumor will develop resistance in 6 months.',
          action: 'rev-warn' },

        { t: 13000, role: 'biologist', title: '🧬 Synthetic Biologist', color: 'bio-color',
          text: 'Valid point. Updating protocol: Recommend combination therapy with a PI3K inhibitor to block the evolutionary escape route. Generating Opentrons synthesis script for both compounds.' },

        { t: 15000, role: 'reviewer', title: '⚖️ Review Committee', color: 'rev-color',
          text: 'Verdict: APPROVED. Score: 95/100. The dual-inhibition strategy mathematically blocks the thermodynamic escape route. Ready for in-vitro synthesis.',
          action: 'rev-approve' }
    ];

    const chatBox = document.getElementById('chat-box');
    let startTime = Date.now();

    function processAction(action) {
        if(action === 'phys-start') {
            document.getElementById('h-phys').style.opacity = 1;
            document.getElementById('n-egfr').classList.add('glitch');
        }
        if(action === 'bio-attack') {
            document.getElementById('h-bio').style.opacity = 1;
            const laser = document.getElementById('laser');
            laser.style.animation = 'fire-laser 1s ease-out forwards';
            setTimeout(() => {
                document.getElementById('n-tumor').style.background = 'var(--accent-green)';
                document.getElementById('n-tumor').style.boxShadow = '0 0 30px var(--accent-green)';
            }, 500);
        }
        if(action === 'rev-warn') {
            document.getElementById('h-rev').style.opacity = 1;
            document.getElementById('h-rev').style.color = 'var(--error)';
            document.getElementById('h-rev').innerHTML = 'WARNING<br>EVOLUTIONARY ESCAPE';
            document.getElementById('n-pten').style.background = 'var(--error)';
            document.getElementById('n-pten').style.boxShadow = '0 0 20px var(--error)';
        }
        if(action === 'rev-approve') {
            document.getElementById('h-rev').style.color = 'var(--accent-green)';
            document.getElementById('h-rev').innerHTML = 'VERDICT: APPROVED<br>SCORE: 95/100';
            document.getElementById('n-pten').style.background = 'var(--accent-green)';
            document.getElementById('n-tumor').classList.add('glitch');
        }
    }

    function runScript() {
        startTime = Date.now();
        
        setInterval(() => {
            document.getElementById('beat').textContent = Math.floor((Date.now() - startTime) / 500);
        }, 100);

        script.forEach(step => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = `message msg-${step.role}`;
                div.innerHTML = `<div class="role-badge ${step.color}">${step.title}</div><div>${step.text}</div>`;
                chatBox.appendChild(div);
                
                void div.offsetWidth; 
                div.classList.add('visible');
                chatBox.scrollTop = chatBox.scrollHeight;

                if(step.action) processAction(step.action);
            }, step.t);
        });
    }

    window.onload = () => setTimeout(runScript, 500);
</script>

</body>
</html>
